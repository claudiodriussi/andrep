<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AndRep JS Client Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 14px; color: #111; background: #f3f4f6; height: 100vh; display: flex; flex-direction: column; }

    header { background: #1e293b; color: #f8fafc; padding: 14px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    header h1 { font-size: 17px; font-weight: 600; }
    header p { font-size: 12px; color: #94a3b8; margin-top: 2px; }

    .toolbar { background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 10px 20px; display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
    button { padding: 7px 16px; border-radius: 6px; border: 1px solid #d1d5db; background: #ffffff; cursor: pointer; font-size: 13px; color: #374151; transition: background 0.15s; }
    button:hover { background: #f1f5f9; }
    button.primary { background: #1e293b; color: #ffffff; border-color: #1e293b; }
    button.primary:hover { background: #334155; }
    .sep { width: 1px; height: 24px; background: #e2e8f0; margin: 0 4px; }
    .status { font-size: 12px; color: #6b7280; margin-left: auto; }

    .panel { flex: 1; overflow: hidden; display: none; }
    .panel.active { display: flex; flex-direction: column; }

    iframe { flex: 1; border: none; background: #fff; }

    pre#records-view {
      flex: 1; overflow: auto; background: #0f172a; color: #94a3b8;
      padding: 20px; font-size: 12px; line-height: 1.5; font-family: "Fira Mono", "Courier New", monospace;
      white-space: pre; margin: 0;
    }

    .loading { flex: 1; display: flex; align-items: center; justify-content: center; color: #6b7280; font-size: 13px; gap: 8px; }
    .spinner { width: 18px; height: 18px; border: 2px solid #cbd5e1; border-top-color: #1e293b; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div>
    <h1>AndRep JS Client Demo</h1>
    <p>TypeScript loop engine → compiled records → Python renderer (WeasyPrint)</p>
  </div>
</header>

<div class="toolbar">
  <button class="primary" onclick="showHtml()">HTML Report</button>
  <button onclick="showPdf()">PDF Report</button>
  <div class="sep"></div>
  <button onclick="showRecords()">Compiled Records JSON</button>
  <span class="status" id="status"></span>
</div>

<!-- HTML preview panel -->
<div class="panel active" id="panel-html">
  <iframe id="html-frame" src="/report?format=html" onload="setStatus('')"></iframe>
</div>

<!-- PDF preview panel -->
<div class="panel" id="panel-pdf">
  <iframe id="pdf-frame"></iframe>
</div>

<!-- Records JSON panel -->
<div class="panel" id="panel-records">
  <pre id="records-view">Click "Compiled Records JSON" to load…</pre>
</div>

<script>
  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showHtml() {
    showPanel('panel-html');
    const frame = document.getElementById('html-frame');
    if (!frame.src.includes('/report')) {
      setStatus('Loading…');
      frame.src = '/report?format=html&t=' + Date.now();
    }
  }

  function showPdf() {
    showPanel('panel-pdf');
    const frame = document.getElementById('pdf-frame');
    setStatus('Rendering PDF…');
    frame.onload = () => setStatus('');
    frame.src = '/report?format=pdf&t=' + Date.now();
  }

  async function showRecords() {
    showPanel('panel-records');
    const pre = document.getElementById('records-view');
    pre.textContent = 'Loading…';
    setStatus('Fetching records…');
    try {
      const res = await fetch('/records');
      const json = await res.json();
      pre.textContent = JSON.stringify(json, null, 2);
      setStatus(`${json.length} records`);
    } catch (e) {
      pre.textContent = 'Error: ' + e;
      setStatus('Error');
    }
  }
</script>
</body>
</html>
